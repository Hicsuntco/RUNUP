name: RunUp
options:
  bundleIdPrefix: com.hicsuntco.runup
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: fr

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: YES

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 7.1.0

targets:
  RunUp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
    sources:
      - path: RunUp
        excludes:
          - "Resources/Fonts/*.md"
    resources:
      - path: RunUp/Resources/Fonts
      - path: RunUp/Resources/Assets.xcassets
    info:
      path: RunUp/Info.plist
      properties:
        CFBundleDisplayName: RunUp
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "3"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Portrait-only design (see DesignSystem/); without this, Apple's App Store validation
        # rejects the bundle for not supporting iPad Split View multitasking's full 4-orientation
        # set. This opts the app out of that requirement instead of adding rotation support.
        UIRequiresFullScreen: true
        NSHealthShareUsageDescription: "RunUp lit tes données Santé (fréquence cardiaque, nombre de pas, séances de sport) pour calculer ta forme du jour, adapter ton programme et suivre tes objectifs quotidiens."
        NSHealthUpdateUsageDescription: "RunUp enregistre tes séances de course dans Santé après chaque sortie."
        NSLocationWhenInUseUsageDescription: "RunUp utilise ta position pour suivre ta distance, ton allure et ton tracé pendant une course."
        UIBackgroundModes:
          - location
        ITSAppUsesNonExemptEncryption: false
        # Google Sign-In — replace both placeholders after creating an OAuth client ID in Google
        # Cloud Console (see IOS_SETUP.md § "Backend (comptes, clubs, activités)"). GIDClientID is
        # the client ID itself; the URL scheme below is that same ID reversed (Google's SDK reads
        # both — one to configure itself, one so iOS can hand the OAuth redirect back to the app).
        GIDClientID: "REPLACE_ME.apps.googleusercontent.com"
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "REPLACE_ME_REVERSED_CLIENT_ID"
        UIAppFonts:
          - BebasNeue-Regular.ttf
          - DMSans-Light.ttf
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-SemiBold.ttf
          - DMSans-Bold.ttf
          - DMSans-Italic.ttf
          - DMMono-Regular.ttf
          - DMMono-Medium.ttf
    entitlements:
      path: RunUp/RunUp.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hicsuntco.runup
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SW49TQ25NV
