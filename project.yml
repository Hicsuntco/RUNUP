name: RunUp
options:
  bundleIdPrefix: com.hicsuntco.runup
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: fr

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: YES

targets:
  RunUp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RunUp
        excludes:
          - "Resources/Fonts/*.md"
    resources:
      - path: RunUp/Resources/Fonts
      - path: RunUp/Resources/Assets.xcassets
    info:
      path: RunUp/Info.plist
      properties:
        CFBundleDisplayName: RunUp
        CFBundleShortVersionString: "2.1"
        CFBundleVersion: "11"
        # Synthesized launch storyboard (no custom .storyboard file) â€” a plain color is all it
        # can show (the real animated wordmark only runs once app code is live, see
        # `SplashView`), but this stops the default white flash before that even appears.
        UILaunchScreen:
          UIColorName: LaunchBackground
        # Lets ASWebAuthenticationSession capture Strava's OAuth redirect (see StravaService.swift)
        # â€” Strava's app settings must have this exact URI (runup://strava-callback) added as an
        # "Authorization Callback Domain"/redirect URI once she creates her Strava API application.
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - runup
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Portrait-only design (see DesignSystem/); without this, Apple's App Store validation
        # rejects the bundle for not supporting iPad Split View multitasking's full 4-orientation
        # set. This opts the app out of that requirement instead of adding rotation support.
        UIRequiresFullScreen: true
        NSHealthShareUsageDescription: "RunUp lit tes donnĂ©es SantĂ© (frĂ©quence cardiaque, nombre de pas, calories actives, sommeil) pour calculer ta forme du jour, adapter ton programme et suivre tes objectifs quotidiens."
        NSHealthUpdateUsageDescription: "RunUp enregistre tes sĂ©ances de course dans SantĂ© aprĂ¨s chaque sortie."
        NSLocationWhenInUseUsageDescription: "RunUp utilise ta position pour suivre ta distance, ton allure et ton tracĂ© pendant une course."
        NSMicrophoneUsageDescription: "RunUp utilise le micro pour t'Ă©couter quand tu poses une question Ă  voix haute Ă  ton coach pendant une course."
        NSSpeechRecognitionUsageDescription: "RunUp transcrit ce que tu dis pour que ton coach puisse te rĂ©pondre Ă  voix haute pendant une course."
        # `location` only â€” the run tracker really does keep GPS alive with the screen off.
        # `remote-notification` used to be listed too, but the server only ever sends visible
        # alert pushes (lib/apns.js), which need no background mode, and no silent-push handler
        # exists â€” an unused background mode is an App Review 2.5.4 flag.
        UIBackgroundModes:
          - location
        # Lets `LiveRunViewModel` start a Live Activity (Lock Screen + Dynamic Island) for the
        # in-progress run â€” see `RunActivityAttributes` (Shared/) and `RunActivityWidget`
        # (RunUpWidgets/). `FrequentUpdates` avoids the system throttling `Activity.update` calls
        # down to roughly once a minute â€” a run updates its own Live Activity every 5s.
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - BebasNeue-Regular.ttf
          - DMSans-Light.ttf
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-SemiBold.ttf
          - DMSans-Bold.ttf
          - DMSans-Italic.ttf
          - DMMono-Regular.ttf
          - DMMono-Medium.ttf
    dependencies:
      - target: RunUpWidgets
        embed: true
    entitlements:
      path: RunUp/RunUp.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.applesignin:
          - Default
        # Shares today's goals/streak/theme with the Home Screen widget (`RunUpWidgets` target) â€”
        # the widget runs in its own process with no other way to reach `UserProfile`. Needs a real
        # App Group created under her Apple Developer account (Certificates, Identifiers & Profiles
        # â†’ Identifiers â†’ App Groups) before this entitlement can actually provision â€” Xcode's
        # automatic signing usually offers to create it inline the first time you add the "App
        # Groups" capability in Signing & Capabilities if it doesn't exist yet.
        com.apple.security.application-groups:
          - group.com.hicsuntco.runup
        # Lets a tapped referral link (https://runup-nu.vercel.app/r/CODE) open straight into the
        # app with the code prefilled instead of just a webpage â€” see
        # public/.well-known/apple-app-site-association (must stay in sync: same domain here as
        # `appIDs`/`components` there) and `ReferralLinkHandler.swift`. Apple only actually
        # verifies this once the app is signed with a real provisioning profile on a device/
        # TestFlight â€” the Simulator can still open the URL via `.onOpenURL` for testing, it just
        # won't have gone through the system's AASA verification step first.
        com.apple.developer.associated-domains:
          - applinks:runup-nu.vercel.app
        # Xcode's automatic signing rewrites this to "production" itself when archiving for
        # TestFlight/App Store (matched to the distribution provisioning profile) â€” "development"
        # here is what a Debug run from Xcode to a real device actually needs.
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hicsuntco.runup
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SW49TQ25NV

  # Home Screen widget â€” shows the same single-ring 3-goal widget as `DailyGoalsBarsView`/streak,
  # fed by `DailyGoalsSnapshot` over the shared App Group rather than any live in-app state (a
  # widget extension is a separate process, restarted on its own schedule by the system â€” it can
  # never hold a live reference to `AppState`). Reuses `RunUp/Shared`'s `Color(hex:)`/`.darkened(_:)`
  # (pure, target-agnostic math) and the app's real brand fonts (bundled + declared below, same as
  # the main target), but not the rest of `RunUp/DesignSystem` â€” `RUColor`/`ThemeStore` are
  # in-memory singletons the app's process keeps live and this one can't, so
  # `WidgetAccentPalette.swift` mirrors just the handful of theme values needed.
  RunUpWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RunUpWidgets
      - path: RunUp/Shared
    resources:
      - path: RunUp/Resources/Fonts
        excludes:
          - "*.md"
    info:
      path: RunUpWidgets/Info.plist
      properties:
        CFBundleDisplayName: RunUp
        # App Store validation requires an extension's version to match its host app's â€” keep
        # these two in step with `RunUp`'s `CFBundleShortVersionString`/`CFBundleVersion` above.
        CFBundleShortVersionString: "2.1"
        CFBundleVersion: "11"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        # Only the 2 families this widget's redesign actually uses (Bebas Neue for the streak/ring
        # numerals, DM Sans Bold for labels) â€” no need to ship the whole main-app font set into a
        # second bundle.
        UIAppFonts:
          - BebasNeue-Regular.ttf
          - DMSans-Bold.ttf
          - DMSans-SemiBold.ttf
    entitlements:
      path: RunUpWidgets/RunUpWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hicsuntco.runup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hicsuntco.runup.widgets
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SW49TQ25NV
        TARGETED_DEVICE_FAMILY: "1"
