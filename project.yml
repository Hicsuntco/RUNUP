name: RunUp
options:
  bundleIdPrefix: com.hicsuntco.runup
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: fr

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: YES

targets:
  RunUp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RunUp
        excludes:
          - "Resources/Fonts/*.md"
    resources:
      - path: RunUp/Resources/Fonts
      - path: RunUp/Resources/Assets.xcassets
    info:
      path: RunUp/Info.plist
      properties:
        CFBundleDisplayName: RunUp
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "8"
        # Synthesized launch storyboard (no custom .storyboard file) — a plain color is all it
        # can show (the real animated wordmark only runs once app code is live, see
        # `SplashView`), but this stops the default white flash before that even appears.
        UILaunchScreen:
          UIColorName: LaunchBackground
        # Lets ASWebAuthenticationSession capture Strava's OAuth redirect (see StravaService.swift)
        # — Strava's app settings must have this exact URI (runup://strava-callback) added as an
        # "Authorization Callback Domain"/redirect URI once she creates her Strava API application.
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - runup
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Portrait-only design (see DesignSystem/); without this, Apple's App Store validation
        # rejects the bundle for not supporting iPad Split View multitasking's full 4-orientation
        # set. This opts the app out of that requirement instead of adding rotation support.
        UIRequiresFullScreen: true
        NSHealthShareUsageDescription: "RunUp lit tes données Santé (fréquence cardiaque, nombre de pas, séances de sport) pour calculer ta forme du jour, adapter ton programme et suivre tes objectifs quotidiens."
        NSHealthUpdateUsageDescription: "RunUp enregistre tes séances de course dans Santé après chaque sortie."
        NSLocationWhenInUseUsageDescription: "RunUp utilise ta position pour suivre ta distance, ton allure et ton tracé pendant une course."
        NSMicrophoneUsageDescription: "RunUp utilise le micro pour t'écouter quand tu poses une question à voix haute à ton coach pendant une course."
        NSSpeechRecognitionUsageDescription: "RunUp transcrit ce que tu dis pour que ton coach puisse te répondre à voix haute pendant une course."
        UIBackgroundModes:
          - location
          - remote-notification
        # Lets `LiveRunViewModel` start a Live Activity (Lock Screen + Dynamic Island) for the
        # in-progress run — see `RunActivityAttributes` (Shared/) and `RunActivityWidget`
        # (RunUpWidgets/). `FrequentUpdates` avoids the system throttling `Activity.update` calls
        # down to roughly once a minute — a run updates its own Live Activity every 5s.
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - BebasNeue-Regular.ttf
          - DMSans-Light.ttf
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-SemiBold.ttf
          - DMSans-Bold.ttf
          - DMSans-Italic.ttf
          - DMMono-Regular.ttf
          - DMMono-Medium.ttf
    dependencies:
      - target: RunUpWidgets
        embed: true
    entitlements:
      path: RunUp/RunUp.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.applesignin:
          - Default
        # Shares today's goals/streak/theme with the Home Screen widget (`RunUpWidgets` target) —
        # the widget runs in its own process with no other way to reach `UserProfile`. Needs a real
        # App Group created under her Apple Developer account (Certificates, Identifiers & Profiles
        # → Identifiers → App Groups) before this entitlement can actually provision — Xcode's
        # automatic signing usually offers to create it inline the first time you add the "App
        # Groups" capability in Signing & Capabilities if it doesn't exist yet.
        com.apple.security.application-groups:
          - group.com.hicsuntco.runup
        # Lets a tapped referral link (https://runup-nu.vercel.app/r/CODE) open straight into the
        # app with the code prefilled instead of just a webpage — see
        # public/.well-known/apple-app-site-association (must stay in sync: same domain here as
        # `appIDs`/`components` there) and `ReferralLinkHandler.swift`. Apple only actually
        # verifies this once the app is signed with a real provisioning profile on a device/
        # TestFlight — the Simulator can still open the URL via `.onOpenURL` for testing, it just
        # won't have gone through the system's AASA verification step first.
        com.apple.developer.associated-domains:
          - applinks:runup-nu.vercel.app
        # Xcode's automatic signing rewrites this to "production" itself when archiving for
        # TestFlight/App Store (matched to the distribution provisioning profile) — "development"
        # here is what a Debug run from Xcode to a real device actually needs.
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hicsuntco.runup
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SW49TQ25NV

  # Home Screen widget — shows the same single-ring 3-goal widget as `DailyGoalsBarsView`/streak,
  # fed by `DailyGoalsSnapshot` over the shared App Group rather than any live in-app state (a
  # widget extension is a separate process, restarted on its own schedule by the system — it can
  # never hold a live reference to `AppState`). Deliberately does NOT reuse `RunUp/DesignSystem` —
  # `RUColor`/`ThemeStore` are in-memory singletons the app's process keeps live and this one
  # can't, and system fonts read better than a condensed display face at small widget sizes anyway
  # — so `WidgetColor.swift`/`WidgetAccentPalette.swift` mirror just the handful of values needed.
  RunUpWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RunUpWidgets
      - path: RunUp/Shared
    info:
      path: RunUpWidgets/Info.plist
      properties:
        CFBundleDisplayName: RunUp
        # App Store validation requires an extension's version to match its host app's — keep
        # these two in step with `RunUp`'s `CFBundleShortVersionString`/`CFBundleVersion` above.
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "8"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: RunUpWidgets/RunUpWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hicsuntco.runup
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hicsuntco.runup.widgets
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SW49TQ25NV
        TARGETED_DEVICE_FAMILY: "1"
