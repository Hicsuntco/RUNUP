name: RunUp
options:
  bundleIdPrefix: com.hicsuntco.runup
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: fr

settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: YES

targets:
  RunUp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: RunUp
        excludes:
          - "Resources/Fonts/*.md"
    resources:
      - path: RunUp/Resources/Fonts
      - path: RunUp/Resources/Assets.xcassets
    info:
      path: RunUp/Info.plist
      properties:
        CFBundleDisplayName: RunUp
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "2"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Portrait-only design (see DesignSystem/); without this, Apple's App Store validation
        # rejects the bundle for not supporting iPad Split View multitasking's full 4-orientation
        # set. This opts the app out of that requirement instead of adding rotation support.
        UIRequiresFullScreen: true
        NSHealthShareUsageDescription: "RunUp lit tes données Santé (fréquence cardiaque, sommeil, séances de course) pour calculer ta forme du jour et adapter ton programme."
        NSHealthUpdateUsageDescription: "RunUp enregistre tes séances de course dans Santé après chaque sortie."
        NSLocationWhenInUseUsageDescription: "RunUp utilise ta position pour suivre ta distance, ton allure et ton tracé pendant une course."
        UIBackgroundModes:
          - location
        ITSAppUsesNonExemptEncryption: false
        UIAppFonts:
          - BebasNeue-Regular.ttf
          - DMSans-Light.ttf
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-SemiBold.ttf
          - DMSans-Bold.ttf
          - DMSans-Italic.ttf
          - DMMono-Regular.ttf
          - DMMono-Medium.ttf
    entitlements:
      path: RunUp/RunUp.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hicsuntco.runup
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: SW49TQ25NV
